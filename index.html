<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liquid Glassmorphic OS Simulator</title>
    <link rel="stylesheet" href="styles.css">
    <script src="script.js" defer></script>
</head>
<body>
    <div id="taskbar">
        <div id="start-menu">Start</div>
        <div id="system-tray">
            <div class="tray-icon">☰</div>
        </div>
    </div>
    <div id="windows-container">
        <div class="window" id="file-explorer" draggable="true">
            <div class="header">
                <span>File Explorer</span>
                <button class="close">X</button>
            </div>
            <div class="content">
                <div class="folder">Documents</div>
                <div class="folder">Downloads</div>
            </div>
        </div>
        <div class="window" id="text-editor" draggable="true">
            <div class="header">
                <span>Text Editor</span>
                <button class="close">X</button>
            </div>
            <textarea></textarea>
        </div>
        <div class="window" id="web-browser" draggable="true">
            <div class="header">
                <span>Web Browser</span>
                <button class="close">X</button>
            </div>
            <input type="text" placeholder="Enter URL">
            <button>Go</button>
        </div>
    </div>
    <div id="settings-panel">
        <h2>Settings</h2>
        <label for="theme">Theme:</label>
        <select id="theme">
            <option value="light">Light</option>
            <option value="dark">Dark</option>
        </select>
    </div>
</body>
</html>
